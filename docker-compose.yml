services:
  fluxcache:
    build: .
    ports:
      - "6379:6379"
      - "8081:8081"
    volumes:
      - ./config.yaml:/config.yaml:ro
      - fluxcache-data:/data
    command: ["/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "256M"
        reservations:
          cpus: "0.25"
          memory: "64M"

volumes:
  fluxcache-data:
