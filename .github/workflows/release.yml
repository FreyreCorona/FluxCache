name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Build and package
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              name="fluxcache_${os}_${arch}"
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/$name/fluxcache" .
              cp README.md config.yaml "dist/$name/"
              cd dist && tar czf "${name}.tar.gz" "$name" && cd ..
            done
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
